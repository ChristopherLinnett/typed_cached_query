include: package:flutter_lints/flutter.yaml

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options

analyzer:
  # Fixtures under test/fixtures/ are intentionally broken — they're regression inputs for tests
  # that shell out to `dart analyze <fixture>` to assert specific diagnostics. Exclude them from
  # project-wide analysis so IDEs and bare `dart analyze` don't surface them as errors.
  exclude:
    - test/fixtures/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # Dart 3.7+ treats `_, _` (or more) as deliberately discarded multi-parameter wildcards —
    # that's the intended pattern in this repo's listener and callback signatures. The
    # `unnecessary_underscores` lint flags this idiom as if it were `__`. Disable it.
    unnecessary_underscores: false

# Add this section for formatter configuration
formatter:
  page_width: 150
