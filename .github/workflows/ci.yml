name: CI

on:
  push:
    tags-ignore: ['**']
  pull_request:

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: dart pub get

      - name: Static analysis
        run: dart analyze --fatal-infos lib/

      - name: Run tests
        run: flutter test
